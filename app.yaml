# Databricks Apps configuration for Genie Workbench
# See: https://docs.databricks.com/dev-tools/databricks-apps/
#
# Genie Workbench combines:
#   - GenieRx: LLM-powered analysis and optimization of Genie Spaces
#   - GenieIQ: Org-wide scoring with PostgreSQL (Lakebase) persistence
#
# Authentication: User-based (OBO) — users can only access Genie Spaces
# they have permission to manage.
#
# The FastAPI server serves both:
#   - Static React frontend files from /frontend/dist
#   - REST API endpoints under /api

command:
  - "uvicorn"
  - "backend.main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  # ---------------------------------------------------------------------------
  # MLflow Tracing
  # ---------------------------------------------------------------------------
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
  - name: MLFLOW_REGISTRY_URI
    value: "databricks-uc"
  - name: MLFLOW_EXPERIMENT_ID
    value: "2624606869914616"

  # ---------------------------------------------------------------------------
  # LLM Model
  # ---------------------------------------------------------------------------
  - name: LLM_MODEL
    value: "databricks-claude-sonnet-4-6"

  # ---------------------------------------------------------------------------
  # SQL Warehouse — pulled from the app resource named "sql-warehouse".
  # Configure the warehouse resource in the Databricks Apps UI.
  # Falls back to auto-detect if empty.
  # ---------------------------------------------------------------------------
  - name: SQL_WAREHOUSE_ID
    valueFrom: sql-warehouse

  # ---------------------------------------------------------------------------
  # Genie Space target directory (where new spaces are created)
  # Defaults to /Shared/ which is writable by most service principals.
  # Override to a specific folder if needed (e.g. /Workspace/Shared/Analytics/).
  # ---------------------------------------------------------------------------
  - name: GENIE_TARGET_DIRECTORY
    value: "/Shared/"

  # ---------------------------------------------------------------------------
  # Local dev auth (only used when running outside Databricks Apps)
  # ---------------------------------------------------------------------------
  - name: DEV_USER_EMAIL
    value: ""

  # ---------------------------------------------------------------------------
  # Lakebase PostgreSQL — credentials auto-generated via Databricks SDK (SP)
  # Grant the app's service principal CAN MANAGE on the Lakebase instance.
  # ---------------------------------------------------------------------------
  - name: LAKEBASE_HOST
    value: ""  # e.g. instance-XXXX.database.cloud.databricks.com
  - name: LAKEBASE_PORT
    value: "5432"
  - name: LAKEBASE_DATABASE
    value: "databricks_postgres"
  - name: LAKEBASE_INSTANCE_NAME
    value: ""  # e.g. genie-workbench-sz

  # ---------------------------------------------------------------------------
  # Auto-Optimize (GSO Engine)
  # ---------------------------------------------------------------------------
  - name: GSO_CATALOG
    value: ""
  - name: GSO_SCHEMA
    value: "genie_space_optimizer"
  - name: GSO_JOB_ID
    value: ""
  - name: GSO_WAREHOUSE_ID
    valueFrom: sql-warehouse

# ---------------------------------------------------------------------------
# User Authorization Scopes (OBO)
# These must be configured in the Databricks Apps UI, NOT in this file.
# Navigate to: Compute > Apps > [app] > Edit > User Authorization > +Add Scope
#
# Required scopes:
#   sql                          — SQL warehouse queries
#   dashboards.genie             — Genie Space API (/api/2.0/genie/spaces/*)
#   serving.serving-endpoints    — LLM serving endpoint queries
#   catalog.catalogs:read        — Unity Catalog catalog browsing
#   catalog.schemas:read         — Unity Catalog schema browsing
#   catalog.tables:read          — Unity Catalog table browsing
#
# Without these scopes, the OBO token will lack permissions and API calls
# will fail. After adding scopes, users will see an OAuth consent prompt
# on first access.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Service Principal authorization
# The app runs under its own service principal identity.
# Grant the SP access to the following resources after deploying:
#
#   Programmatic (use notebooks/grant_app_permissions.py):
#     1. Workspace Directory  — Can Manage  (for creating new Genie Spaces)
#     2. Unity Catalog/Schema — USE CATALOG, USE SCHEMA, SELECT
#
#   Via UI:
#     3. LLM Serving Endpoint — Can Query   (Serving > Endpoint > Permissions)
#     4. SQL Warehouse        — Can Use     (SQL > Warehouse > Permissions)
#     5. Genie Space(s)       — Can Edit    (Genie Space > Settings)
#
# Find the service principal at: Compute > Apps > [your app] > Authorization
# The SP name follows the pattern: app-XXXXX [app-name]
# ---------------------------------------------------------------------------
