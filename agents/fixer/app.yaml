# Databricks Apps configuration for genie-fixer agent.
#
# AI fix agent — needs LLM endpoint for plan generation.
# No Lakebase dependency (reads/writes space config via Genie API).

command:
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  # LLM serving endpoint
  - name: LLM_MODEL
    value: "databricks-claude-sonnet-4-6"

  # MLflow Tracing
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
  - name: MLFLOW_REGISTRY_URI
    value: "databricks-uc"
